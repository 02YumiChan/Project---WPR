<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bug Tracking System</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <form id="addPersonForm">
        <input type="text" id="personName" placeholder="First Name" required/>
        <input type="text" id="personSurname" placeholder="Last Name" required/>
        <input type="email" id="personEmail" placeholder="Email" required  />
        <input type="text" id="personUsername" placeholder="Username" required />
        <button type="submit">Add Person</button>
    </form>
  
    <h2>Create Issue</h2>
    <form id="ticketForm">
        <label> Summary
            <input type="text" id="summary" required/>
        </label>
        <label> Description
            <textarea id="description" required></textarea>
        </label>
        <label> Reporter
            <select id="reporter"></select>
        </label>
        <label> Entry Date
            <input type="date" id="entryDate" required/>
        </label>
        <label> Target Resolution Date
            <input type="date" id="targetDate" required/>
        </label>
        <label> Actual Resolution Date
            <input type="date" id="actualDate" required/>
        </label>
        <label> Project
            <select id="project"></select>
        </label>
        <label> Assignment
            <select id="assignment">
                <option value=""></option>
            </select>
        </label>
        <label> Status
            <select id="status">
                <option value="open">Open</option>
                <option value="resolved">Resolved</option>
                <option value="overdue">Overdue</option>
            </select>
        </label>
        <label> Priority
            <select id="priority">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>
        </label>
        <label> Resolution Summary
            <textarea id="resolutionSummary"></textarea>
        </label>

        <div class="flex">
            <button type="submit">Create Issue Ticket</button>
            <button type="button" id="clear">Clear All</button>
        </div>
    </form>

    <h1>Issue Dashboard</h1>
    <div class="row">
        <div class="col">
            <h3>Open</h3>
            <div id="open-list"></div>
        </div>
        <div class="col">
            <h3>Overdue</h3>
            <div id="overdue-list"></div>
        </div>
        <div class="col">
            <h3>Resolved</h3>
            <div id="resolved-list"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="apps.js"></script>
    <script src="view.js"></script>
    <script>
        updateOverdueStatus();
        loadIssues();
    </script>

</body>
</html>
